version: '3.7'

services:

  db:
    container_name: esgipostgres
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db:/var/lib/postgresql/data
    networks:
      - app-network

  server:
    container_name: esgiserver
    build:
      context: server
    ports:
      - 3000:3000
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: supersecret
      DB_NAME: postgres
    volumes:
      - /app/node_modules
    networks:
      - app-network

  client:
    container_name: esgiclient
    build:
      context: client
    ports:
      - 801:80
    depends_on:
      - server
      - db
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
